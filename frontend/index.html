        // AI Assistant Component
        function AIAssistantWidget() {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([
                { id: 1, sender: 'ai', text: "Hello! I'm your 247HealthCenter AI Assistant. I'm available 24/7 to help with any questions about our platform, services, or healthcare guidance. How can I assist you today?" }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            const generateResponse = (userMessage) => {
                const msg = userMessage.toLowerCase();
                if (msg.includes('emergency') || msg.includes('urgent')) {
                    return "For emergencies, register for our Emergency Coverage service. This provides priority response and 24/7 coverage. Call +234 800 000 0000 for immediate assistance.";
                }
                if (msg.includes('book') || msg.includes('appointment')) {
                    return "Book a consultation by clicking 'Book Consultation' on the homepage. This schedules a secure video appointment with our qualified doctors.";
                }
                if (msg.includes('home service') || msg.includes('home visit')) {
                    return "We offer home services: Doctor Visit at Home, Nursing Care, Diagnostics at Home, Physiotherapy at Home, and Specialist Visit.";
                }
                if (msg.includes('doctor') || msg.includes('specialist')) {
                    return "We have 500+ qualified doctors across 50+ specialties. Use 'Find Doctors' to locate the right specialist for your needs.";
                }
                if (msg.includes('24/7') || msg.includes('available')) {
                    return "247HealthCenter is available 24 hours a day, 7 days a week. Our AI Assistant and medical professionals provide round-the-clock support.";
                }
                return "Hello! I'm your 247HealthCenter AI Assistant, available 24/7. I can help with Remote Consultation, Specialist Access, Emergency Coverage, or Home Services.";
            };

            const sendMessage = () => {
                if (!input.trim()) return;
                setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: input }]);
                setIsTyping(true);
                setInput('');
                setTimeout(() => {
                    setMessages(prev => [...prev, { id: Date.now() + 1, sender: 'ai', text: generateResponse(input) }]);
                    setIsTyping(false);
                }, 1000);
            };

            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="fixed bottom-6 right-6 w-16 h-16 rounded-full bg-blue-600 hover:bg-blue-700 shadow-2xl flex items-center justify-center text-white text-3xl z-50">
                        🤖
                    </button>
                    {isOpen && (
                        <div className="fixed bottom-24 right-6 w-96 h-[500px] bg-white rounded-3xl shadow-2xl border flex flex-col z-50 overflow-hidden">
                            <div className="bg-blue-600 text-white p-4">
                                <h3 className="font-bold">247HealthCenter AI</h3>
                                <p className="text-xs opacity-80">Available 24/7</p>
                            </div>
                            <div className="flex-1 p-4 overflow-y-auto space-y-3">
                                {messages.map(msg => (
                                    <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[80%] p-3 rounded-2xl ${msg.sender === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-100'}`}>
                                            <p className="text-sm">{msg.text}</p>
                                        </div>
                                    </div>
                                ))}
                                {isTyping && <div className="flex justify-start"><div className="bg-slate-100 p-3 rounded-2xl">...</div></div>}
                            </div>
                            <div className="p-4 border-t">
                                <div className="flex gap-2">
                                    <input value={input} onChange={(e) => setInput(e.target.value)} placeholder="Ask me anything..." className="flex-1 px-4 py-2 rounded-2xl border" onKeyPress={(e) => e.key === 'Enter' && sendMessage()} />
                                    <button onClick={sendMessage} className="px-4 py-2 rounded-2xl bg-blue-600 text-white">Send</button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        // Main App
        function App() {
            return (
                <div>
                    <HealthCenterApp />
                    <AIAssistantWidget />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
